services:
  - type: worker
    name: axisbot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: WELCOME_CHANNEL_ID
        sync: false
      - key: WELCOME_GIF_URL
        sync: false
